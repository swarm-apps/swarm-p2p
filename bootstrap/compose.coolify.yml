services:
  swarm-bootstrap:
    image: ghcr.io/swarm-apps/swarm-bootstrap:latest
    restart: unless-stopped
    ports:
      - "${SWARM_BOOTSTRAP_TCP_PORT:-4001}:${SWARM_BOOTSTRAP_TCP_PORT:-4001}/tcp"
      - "${SWARM_BOOTSTRAP_QUIC_PORT:-4001}:${SWARM_BOOTSTRAP_QUIC_PORT:-4001}/udp"
    volumes:
      - swarm-bootstrap-data:/data
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
      SWARM_BOOTSTRAP_KEY_FILE: /data/identity.key
      SWARM_BOOTSTRAP_LISTEN_ADDR: "${SWARM_BOOTSTRAP_LISTEN_ADDR:-0.0.0.0}"
      SWARM_BOOTSTRAP_EXTERNAL_IP: "${SWARM_BOOTSTRAP_EXTERNAL_IP:?Set the server public IP}"
      SWARM_BOOTSTRAP_TCP_PORT: "${SWARM_BOOTSTRAP_TCP_PORT:-4001}"
      SWARM_BOOTSTRAP_QUIC_PORT: "${SWARM_BOOTSTRAP_QUIC_PORT:-4001}"
      SWARM_BOOTSTRAP_IDLE_TIMEOUT_SECS: "${SWARM_BOOTSTRAP_IDLE_TIMEOUT_SECS:-120}"
      SWARM_BOOTSTRAP_MAX_RESERVATIONS: "${SWARM_BOOTSTRAP_MAX_RESERVATIONS:-128}"
      SWARM_BOOTSTRAP_MAX_RESERVATIONS_PER_PEER: "${SWARM_BOOTSTRAP_MAX_RESERVATIONS_PER_PEER:-4}"
      SWARM_BOOTSTRAP_RESERVATION_DURATION_SECS: "${SWARM_BOOTSTRAP_RESERVATION_DURATION_SECS:-3600}"
      SWARM_BOOTSTRAP_MAX_CIRCUITS: "${SWARM_BOOTSTRAP_MAX_CIRCUITS:-16}"
      SWARM_BOOTSTRAP_MAX_CIRCUITS_PER_PEER: "${SWARM_BOOTSTRAP_MAX_CIRCUITS_PER_PEER:-4}"
      SWARM_BOOTSTRAP_MAX_CIRCUIT_DURATION_SECS: "${SWARM_BOOTSTRAP_MAX_CIRCUIT_DURATION_SECS:-3600}"
      SWARM_BOOTSTRAP_MAX_CIRCUIT_BYTES: "${SWARM_BOOTSTRAP_MAX_CIRCUIT_BYTES:-536870912}"

volumes:
  swarm-bootstrap-data:
