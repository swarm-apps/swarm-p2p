name: Release Bootstrap Node

on:
  push:
    tags:
      - "bootstrap-v*"

env:
  BINARY_NAME: swarm-bootstrap

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-musl -p ${{ env.BINARY_NAME }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Bootstrap ${{ github.ref_name }}
          generate_release_notes: true
          files: target/x86_64-unknown-linux-musl/release/${{ env.BINARY_NAME }}

  docker-image:
    name: Docker image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ env.BINARY_NAME }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set architecture tag
        run: echo "ARCH_TAG=${IMAGE_NAME}:${GITHUB_REF_NAME}-${{ matrix.arch }}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: bootstrap/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.ARCH_TAG }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  docker-manifest:
    runs-on: ubuntu-latest
    needs: docker-image
    permissions:
      packages: write
    steps:
      - name: Set image tags
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ env.BINARY_NAME }}" >> "$GITHUB_ENV"
          echo "VERSION=${GITHUB_REF_NAME#bootstrap-v}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${VERSION}" \
            --tag "${IMAGE_NAME}:${GITHUB_REF_NAME}" \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${GITHUB_REF_NAME}-amd64" \
            "${IMAGE_NAME}:${GITHUB_REF_NAME}-arm64"
